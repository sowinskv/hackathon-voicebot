services:
  # Database - Using port 5433 to avoid conflict
  postgres:
    image: postgres:15-alpine
    container_name: callcenter-db
    environment:
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
      POSTGRES_DB: callcenter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seeds/default_flow.sql:/docker-entrypoint-initdb.d/02-seeds.sql
      - ./database/seeds/mock_sessions.sql:/docker-entrypoint-initdb.d/03-mock-sessions.sql
      - ./database/seeds/extended_mock_sessions.sql:/docker-entrypoint-initdb.d/04-extended-mock-sessions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter"]
      interval: 2s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - callcenter-network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: callcenter-api
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://callcenter:${DB_PASSWORD:-devpassword123}@postgres:5432/callcenter
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_ENDPOINT=${AZURE_OPENAI_API_ENDPOINT}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_OPENAI_MODEL=${AZURE_OPENAI_MODEL}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5174,http://localhost:5175
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    networks:
      - callcenter-network
    restart: unless-stopped

  # Frontend - Voice App
  voice-app:
    build:
      context: ./frontend/voice-app
      dockerfile: Dockerfile.dev
    container_name: callcenter-voice-app
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_PIPECAT_URL=ws://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/voice-app/src:/app/src
      - ./frontend/voice-app/public:/app/public
      - ./frontend/voice-app/index.html:/app/index.html
      - ./frontend/voice-app/vite.config.ts:/app/vite.config.ts
      - ./frontend/voice-app/.env:/app/.env
    networks:
      - callcenter-network
    stdin_open: true
    tty: true

  # Frontend - Bot Builder
  bot-builder:
    build:
      context: ./frontend/bot-builder
      dockerfile: Dockerfile.dev
    container_name: callcenter-builder
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/bot-builder/src:/app/src
      - ./frontend/bot-builder/public:/app/public
      - ./frontend/bot-builder/index.html:/app/index.html
      - ./frontend/bot-builder/vite.config.ts:/app/vite.config.ts
      - ./frontend/bot-builder/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/bot-builder/.env:/app/.env
    networks:
      - callcenter-network
    stdin_open: true
    tty: true

  # Frontend - Agent Console
  agent-console:
    build:
      context: ./frontend/agent-console
      dockerfile: Dockerfile.dev
    container_name: callcenter-console
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    ports:
      - "5175:5173"
    volumes:
      - ./frontend/agent-console/src:/app/src
      - ./frontend/agent-console/public:/app/public
      - ./frontend/agent-console/index.html:/app/index.html
      - ./frontend/agent-console/vite.config.ts:/app/vite.config.ts
      - ./frontend/agent-console/.env:/app/.env
    networks:
      - callcenter-network
    stdin_open: true
    tty: true

  # VoiceBot Engine (Pipecat WebSocket Server)
  voicebot-engine:
    build:
      context: ./backend/voicebot-engine
      dockerfile: Dockerfile.agent
    container_name: callcenter-voicebot
    environment:
      - PORT=8080
      - API_GATEWAY_URL=http://api-gateway:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    ports:
      - "8080:8080"
    networks:
      - callcenter-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  callcenter-network:
    driver: bridge
