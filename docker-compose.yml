version: '3.8'

services:
  # Database - Using port 5433 to avoid conflict
  postgres:
    image: postgres:15-alpine
    container_name: callcenter-db
    environment:
      POSTGRES_USER: callcenter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
      POSTGRES_DB: callcenter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seeds/default_flow.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcenter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - callcenter-network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile.dev
    container_name: callcenter-api
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://callcenter:${DB_PASSWORD:-devpassword123}@postgres:5432/callcenter
      - PORT=3000
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-your_livekit_api_key_here}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-your_livekit_api_secret_here}
      - LIVEKIT_URL=${LIVEKIT_URL:-your_livekit_url_here}
      - CORS_ORIGIN=http://localhost:5173,http://localhost:5174,http://localhost:5175
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/api-gateway:/app
      - /app/node_modules
    networks:
      - callcenter-network
    restart: unless-stopped

  # Frontend - Voice App
  voice-app:
    image: node:20-alpine
    container_name: callcenter-voice-app
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
      - VITE_LIVEKIT_URL=${LIVEKIT_URL:-your_livekit_url_here}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/voice-app:/app
      - /app/node_modules
    networks:
      - callcenter-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    stdin_open: true
    tty: true

  # Frontend - Bot Builder
  bot-builder:
    image: node:20-alpine
    container_name: callcenter-builder
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:3000
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/bot-builder:/app
      - /app/node_modules
    networks:
      - callcenter-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    stdin_open: true
    tty: true

  # Frontend - Agent Console
  agent-console:
    image: node:20-alpine
    container_name: callcenter-console
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_WS_URL=ws://localhost:3000
    ports:
      - "5175:5173"
    volumes:
      - ./frontend/agent-console:/app
      - /app/node_modules
    networks:
      - callcenter-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    stdin_open: true
    tty: true

volumes:
  postgres_data:

networks:
  callcenter-network:
    driver: bridge
