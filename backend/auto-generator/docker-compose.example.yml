# Example Docker Compose configuration
# Add this service to your main docker-compose.yml

services:
  auto-generator:
    build: ./auto-generator
    container_name: auto-generator
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:password@db:5432/voicebot
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AZURE_WHISPER_ENDPOINT=${AZURE_WHISPER_ENDPOINT}
      - AZURE_WHISPER_API_KEY=${AZURE_WHISPER_API_KEY}
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - /tmp/uploads:/tmp/uploads
    networks:
      - voicebot-network

  # If you don't have a database service yet:
