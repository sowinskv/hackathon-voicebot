<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>super kitties - Voice Banking Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            letter-spacing: -0.01em;
        }

        /* White background */
        body {
            background: #ffffff;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 4rem;
            animation: fadeIn 1.2s ease-out;
        }

        /* Top left - Brand */
        .brand {
            position: absolute;
            top: 4rem;
            left: 4rem;
            font-size: 1rem;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.5);
            letter-spacing: 0.1em;
            text-transform: lowercase;
            animation: fadeIn 1s ease-out 0.3s backwards;
        }

        /* Top right - Navigation list */
        .nav-list {
            position: absolute;
            top: 4rem;
            right: 15%;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            animation: slideInRight 0.8s ease-out 0.3s backwards;
        }

        .nav-list a {
            font-size: 0.95rem;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: -0.01em;
            position: relative;
            padding: 0.25rem 0;
        }

        .nav-list a:hover {
            color: rgba(0, 0, 0, 0.95);
            transform: translateX(-4px);
        }

        .nav-list a::after {
            content: '';
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 4px;
            height: 4px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .nav-list a:hover::after {
            transform: translateY(-50%) scale(1);
        }

        /* Circles with app backgrounds */
        .circles-container {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 4rem;
            animation: fadeInUp 1s ease-out 0.7s backwards;
        }

        .circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: float 8s ease-in-out infinite;
            text-decoration: none;
            display: block;
            flex-shrink: 0;
        }

        .circle:hover {
            transform: scale(1.08);
        }

        .circle::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .circle::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        /* Voice App - white edges, visible center-right */
        .circle.voice::before {
            background-image: url('./public/voice-app-bg.jpg');
            background-position: 75% 35%;
            background-size: 280%;
        }

        .circle.voice::after {
            background: radial-gradient(ellipse 90% 110% at 65% 45%, transparent 0%, transparent 35%, rgba(255, 255, 255, 0.7) 60%, rgba(255, 255, 255, 1) 85%);
        }

        .circle.voice {
            animation-delay: 0s;
        }

        /* Bot Builder - white edges, visible bottom-left */
        .circle.builder::before {
            background-image: url('./public/bot-builder-bg.jpg');
            background-position: 25% 70%;
            background-size: 320%;
        }

        .circle.builder::after {
            background: radial-gradient(ellipse 100% 95% at 30% 65%, transparent 0%, transparent 30%, rgba(255, 255, 255, 0.65) 55%, rgba(255, 255, 255, 1) 82%);
        }

        .circle.builder {
            animation-delay: 0.6s;
        }

        /* Agent Console - white edges, visible top-center */
        .circle.console::before {
            background-image: url('./public/agent-console-bg.jpg');
            background-position: 50% 20%;
            background-size: 300%;
        }

        .circle.console::after {
            background: radial-gradient(ellipse 105% 85% at 50% 30%, transparent 0%, transparent 32%, rgba(255, 255, 255, 0.68) 58%, rgba(255, 255, 255, 1) 84%);
        }

        .circle.console {
            animation-delay: 1.2s;
        }

        /* Decorative circles - just visuals */
        .circle.deco {
            pointer-events: none;
            opacity: 0.6;
        }

        .circle.deco-1::before {
            background-image: url('./public/voice-app-bg.jpg');
            background-position: 20% 60%;
            background-size: 350%;
        }

        .circle.deco-1::after {
            background: radial-gradient(ellipse 95% 100% at 25% 55%, transparent 0%, transparent 28%, rgba(255, 255, 255, 0.72) 56%, rgba(255, 255, 255, 1) 86%);
        }

        .circle.deco-1 {
            animation-delay: 0.3s;
        }

        .circle.deco-2::before {
            background-image: url('./public/bot-builder-bg.jpg');
            background-position: 80% 40%;
            background-size: 290%;
        }

        .circle.deco-2::after {
            background: radial-gradient(ellipse 92% 108% at 70% 45%, transparent 0%, transparent 33%, rgba(255, 255, 255, 0.7) 59%, rgba(255, 255, 255, 1) 85%);
        }

        .circle.deco-2 {
            animation-delay: 0.9s;
        }

        .circle.deco-3::before {
            background-image: url('./public/agent-console-bg.jpg');
            background-position: 35% 80%;
            background-size: 310%;
        }

        .circle.deco-3::after {
            background: radial-gradient(ellipse 98% 93% at 40% 75%, transparent 0%, transparent 31%, rgba(255, 255, 255, 0.69) 57%, rgba(255, 255, 255, 1) 83%);
        }

        .circle.deco-3 {
            animation-delay: 1.5s;
        }

        /* Info text */
        .info-text {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            max-width: 240px;
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.4);
            line-height: 1.6;
            letter-spacing: 0.02em;
            animation: fadeIn 1s ease-out 1s backwards;
        }

        /* Year */
        .year {
            position: absolute;
            bottom: 4rem;
            right: 4rem;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(0, 0, 0, 0.35);
            letter-spacing: 0.1em;
            animation: fadeIn 1s ease-out 1.2s backwards;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(calc(-50% + 20px));
            }
            to {
                opacity: 1;
                transform: translateY(-50%);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .circle {
                width: 140px;
                height: 140px;
            }
        }

        @media (max-width: 1024px) {
            .circles-container {
                padding: 0 2rem;
            }

            .circle {
                width: 110px;
                height: 110px;
            }

            .nav-list {
                right: 10%;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem;
            }

            .nav-list, .brand, .info-text, .year {
                position: relative;
                top: auto;
                left: auto;
                right: auto;
                bottom: auto;
            }

            .brand {
                margin-bottom: 3rem;
            }

            .nav-list {
                margin-bottom: 3rem;
            }

            .circles-container {
                position: relative;
                top: auto;
                left: auto;
                right: auto;
                transform: none;
                margin: 4rem 0;
                flex-wrap: wrap;
                justify-content: center;
                gap: 2rem;
            }

            .circle {
                width: 100px;
                height: 100px;
            }

            .circle.deco {
                display: none;
            }

            .info-text {
                margin-bottom: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top left - Brand -->
        <div class="brand">super kitties</div>

        <!-- Top right - Navigation -->
        <nav class="nav-list">
            <a href="http://localhost:5173">Voice Banking Assistant</a>
            <a href="http://localhost:5174">Bot Builder</a>
            <a href="http://localhost:5175">Agent Console</a>
        </nav>

        <!-- Circles with app backgrounds -->
        <div class="circles-container">
            <div class="circle deco deco-1"></div>
            <a href="http://localhost:5173" class="circle voice"></a>
            <div class="circle deco deco-2"></div>
            <a href="http://localhost:5174" class="circle builder"></a>
            <div class="circle deco deco-3"></div>
            <a href="http://localhost:5175" class="circle console"></a>
        </div>

        <!-- Info text bottom left -->
        <div class="info-text">
            AI-powered voice banking platform with conversational flows and real-time monitoring.
        </div>

        <!-- Year bottom right -->
        <div class="year">2026</div>
    </div>
</body>
</html>
