<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>super kitties - Voice Banking Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            letter-spacing: -0.01em;
        }

        /* Blurred background */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: url('./public/ui-assets/-59.jpg') center center / cover no-repeat;
            filter: blur(40px);
            pointer-events: none;
            z-index: 0;
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1.2s ease-out;
        }

        /* Vertical line */
        .vertical-line {
            position: absolute;
            left: 50%;
            top: 5%;
            bottom: 5%;
            width: 1px;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(255, 255, 255, 0.2) 10%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0.2) 90%,
                transparent 100%
            );
            transform: translateX(-50%);
            animation: lineAppear 1.5s ease-out;
        }

        /* Left title */
        .title {
            position: absolute;
            right: calc(50% + 80px);
            top: 50%;
            transform: translateY(-50%);
            text-align: right;
            animation: titleAppear 1s ease-out 0.3s backwards;
            z-index: 20;
        }

        .title h1 {
            font-size: 3.5rem;
            font-weight: 300;
            color: white;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            opacity: 0.95;
        }

        .title h1 span {
            display: inline-block;
            opacity: 1;
        }

        .title h1 span:nth-child(even) {
            opacity: 0.3;
        }

        /* Glass navigation panels */
        .nav-panel {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            padding: 2rem 2.5rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .nav-panel:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateX(-50%) scale(1.02);
        }

        .nav-panel.top {
            top: 12%;
            animation: panelSlideIn 0.8s ease-out 0.6s backwards;
        }

        .nav-panel.bottom {
            bottom: 12%;
            animation: panelSlideIn 0.8s ease-out 0.8s backwards;
        }

        .nav-label {
            font-size: 0.75rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .nav-title {
            font-size: 1.5rem;
            font-weight: 300;
            color: white;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .nav-description {
            font-size: 0.875rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }

        /* Top metadata */
        .metadata {
            position: absolute;
            top: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeIn 1s ease-out 1s backwards;
        }

        /* Bottom year */
        .year {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            animation: fadeIn 1s ease-out 1.2s backwards;
        }

        /* Side accent text */
        .accent-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.2em;
            animation: fadeIn 1s ease-out 1s backwards;
        }

        .accent-text.left {
            right: calc(50% + 280px);
        }

        .accent-text.right {
            left: calc(50% + 280px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes lineAppear {
            from {
                opacity: 0;
                transform: translateX(-50%) scaleY(0);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) scaleY(1);
            }
        }

        @keyframes titleAppear {
            from {
                opacity: 0;
                filter: blur(10px);
                transform: translate(-50%, -50%) scale(0.95);
            }
            to {
                opacity: 1;
                filter: blur(0);
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes panelSlideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title h1 {
                font-size: 2.5rem;
            }

            .nav-panel {
                width: 85%;
                padding: 1.5rem;
            }

            .accent-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Metadata top -->
        <div class="metadata">AI Voice Banking Platform</div>

        <!-- Vertical line -->
        <div class="vertical-line"></div>

        <!-- Top navigation panel -->
        <a href="http://localhost:5174" class="nav-panel top">
            <div class="nav-label">Design & Configure</div>
            <div class="nav-title">Bot Builder</div>
            <div class="nav-description">Create conversational AI flows and design custom bot personalities</div>
        </a>

        <!-- Center title -->
        <div class="title">
            <h1>
                <span>s</span><span>u</span><span>p</span><span>e</span><span>r</span>
                <span> </span>
                <span>k</span><span>i</span><span>t</span><span>t</span><span>i</span><span>e</span><span>s</span>
            </h1>
        </div>

        <!-- Bottom navigation panel -->
        <a href="http://localhost:5175" class="nav-panel bottom">
            <div class="nav-label">Monitor & Analyze</div>
            <div class="nav-title">Agent Console</div>
            <div class="nav-description">Real-time dashboard for session management and metrics analysis</div>
        </a>

        <!-- Side accent text -->
        <div class="accent-text left">×</div>
        <div class="accent-text right"><a href="http://localhost:5173" style="color: inherit; text-decoration: none; letter-spacing: 0.15em;">VOICE APP</a></div>

        <!-- Year bottom -->
        <div class="year">2026</div>
    </div>
</body>
</html>
